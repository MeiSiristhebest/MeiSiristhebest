name: Generate Profile Assets

on:
  schedule:
    - cron: "0 18 * * *" # 每天自动更新
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true       # 🚀 强制在 Node 24 运行，消灭 Node 20 警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 自动生成专属暗黑贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 调用 lowlighter/metrics 生成全景统计看板
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # 💡 使用包含 repo 与 user 读取权限的 Personal Access Token 获取数据
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          committer_token: ${{ secrets.METRICS_TOKEN }}  # 💡 让 metrics 自动推送大图
          repositories_forks: yes  # 💡 允许统计你 Fork 出来的仓库数据
          commits_authoring: MeiSiristhebest, Mei, MTx1534572236@outlook.com  # 💡 核心配置：认领你本地常用的 Git 提交署名

          # 💡 [增量配置 1] 编程语言分析
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 0  # 💡 设为 0 代表全盘扫描统计历史所有仓库语言

          # 💡 [增量配置 2] 3D 立体等轴测 commits 柱状日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 💡 [注] achievements 勋章插件因官方 bug 对无星/空成就的新账号会报 Unexpected error，已在下方关闭以保持主页清爽
          plugin_achievements: no

      # 3. 自动将生成的“贪吃蛇图片”提交回仓库（与 metrics 自动提交分工合作，完美避免容器内目录无法读取的问题）
      - name: Commit and Push Snake Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake.svg
          git commit -m "chore: update snake contribution assets [skip ci]" || exit 0
          git push
