name: Generate Profile Assets

on:
  schedule:
    - cron: "0 18 * * *" # 每天自动更新
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true       # 🚀 强制在 Node 24 运行，消灭 Node 20 警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 自动生成专属暗黑贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 调用 lowlighter/metrics 生成全景统计看板（开启 debug: yes 以获取 100% 具体的 API 或 HTML 解析报错堆栈）
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # 💡 使用包含 repo 与 user 读取权限的 Personal Access Token
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          committer_token: ${{ secrets.METRICS_TOKEN }}  # 💡 让 metrics 自动推送大图
          repositories_forks: yes  # 💡 允许统计你 Fork 出来的仓库数据
          commits_authoring: MeiSiristhebest, Mei, MTx1534572236@outlook.com  # 💡 核心配置：认领你本地常用的 Git 提交署名
          debug: yes  # 💡 核心调试开关：开启 debug 输出，让下一次运行日志打印出 100% 具体的报错堆栈与接口响应体，从而精准 Debug！

          # 💡 [极客配置 1] 编程语言分析
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 0  # 设为 0 全盘扫描统计历史所有仓库语言

          # 💡 [极客配置 2] 3D 立体等轴测 commits 柱状日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 💡 [极客配置 3] 累计代码修改行数分析
          plugin_lines: yes

          # 💡 [极客配置 4] 游戏化极客成就徽章
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no

          # 💡 [极客配置 5] 24小时编码习惯与作息分析
          plugin_habits: yes
          plugin_habits_from: 200            # 分析最近 200 个 commits
          plugin_habits_days: 14             # 分析天数范围
          plugin_habits_facts: yes           # 显示有趣的习惯描述
          plugin_habits_charts: yes          # 显示 24 小时活跃段渐变图表

      # 3. 自动将生成的“贪吃蛇图片”提交回仓库（与 metrics 自动提交分工合作，完美避免容器内目录无法读取的问题）
      - name: Commit and Push Snake Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake.svg
          git commit -m "chore: update snake contribution assets [skip ci]" || exit 0
          git push
