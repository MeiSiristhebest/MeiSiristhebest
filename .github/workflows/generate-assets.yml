name: Generate Profile Assets

on:
  schedule:
    - cron: "0 2,14 * * *"  # 💡 每天北京时间 10:00 和 22:00 定时自动运行
  push:
    branches:
      - main
    paths-ignore:
      - "github-contribution-grid-snake*"
      - "profile-3d-contrib/**"
      - "github-profile-trophy.svg"
      - "github-metrics.svg"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 生成贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 生成 3D 贡献城堡
      - name: Generate 3D Contribution Calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: MeiSiristhebest

      # 3. 抓取大奖杯图片存为本地静态文件（增加重试机制，确保物理文件 100% 存在）
      - name: Fetch and Save GitHub Profile Trophy
        run: |
          curl -sLo github-profile-trophy.svg "https://github-profile-trophy.vercel.app/?username=MeiSiristhebest&theme=tokyonight" || true

      # 4. 调用 lowlighter/metrics 生成全景看板（开启超稳的近期活动时间线 plugin_activity）
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          committer_token: ${{ secrets.METRICS_TOKEN }}  # 全量打包工作区资产自动 push
          repositories_forks: yes
          commits_authoring: MeiSiristhebest, Mei, MTx1534572236@outlook.com

          # 💡 [重点组件 1] 编程语言分析
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 0

          # 💡 [重点组件 2] 极客代码修改行数
          plugin_lines: yes

          # 💡 [核心新增组件 3] 个人近期活动动态时间线 (Recent Activity Timeline - 绝对稳健，无弃用 API 崩溃问题)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review

          plugin_achievements: no
          plugin_habits: no
          plugin_isocalendar: no
