name: Generate Profile Assets

on:
  schedule:
    - cron: "0 18 * * *" # 每天自动更新
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true       # 🚀 强制在 Node 24 运行，消灭 Node 20 警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 💡 升级为 @v4 主版本，GitHub 会自动使用原生适配 Node 24 且无 Node 20 警告的最新 checkout 实现
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 自动生成专属暗黑贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 调用 lowlighter/metrics 生成全景统计看板，并设置 output_action 为 none（使用用户私有 METRICS_TOKEN）
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # 💡 使用包含 repo 读取权限的 Personal Access Token 获取数据
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          filename: github-metrics.svg
          output_action: none  # 💡 关键参数：禁止 Metrics 自动提交并清除图片，保留给后续步骤手动统一 commit & push
          repositories_forks: yes  # 💡 核心配置：允许统计 Fork 出来的仓库数据（如 Ningxiangshop），防止统计数顽固地显示为 1 仓库、0 语言！

      # 3. 自动将生成的贪吃蛇与全景看板一同提交回仓库
      - name: Commit and Push Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake.svg github-metrics.svg
          git commit -m "chore: update profile metrics and snake assets [skip ci]" || exit 0
          git push
