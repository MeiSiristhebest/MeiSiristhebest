name: Generate Profile Assets

on:
  schedule:
    - cron: "0 2,14 * * *"  # 💡 每天北京时间 10:00 和 22:00 定时自动运行
  push:
    branches:
      - main
    paths-ignore:
      - "github-contribution-grid-snake*"
      - "profile-3d-contrib/**"
      - "github-metrics.svg"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 生成贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 生成 3D 贡献城堡
      - name: Generate 3D Contribution Calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: MeiSiristhebest

      # 3. 调用 lowlighter/metrics 生成全景看板（放大 padding 至 20%，彻底根除 Most used languages 底部文字裁切截断 Bug）
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories
          filename: github-metrics.svg
          committer_token: ${{ secrets.METRICS_TOKEN }}  # 全量打包工作区资产自动 push
          repositories_forks: yes
          commits_authoring: MeiSiristhebest, Mei, MTx1534572236@outlook.com

          # 💡 [关键修复] 20% 底部 padding，确保 Most used languages 底部文字 100% 舒展不截断
          config_metadata: no
          config_animations: no
          config_padding: 0, 20%

          # 💡 [超稳核心 1] 编程语言分析
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 0

          # 💡 [关键配置 2] 强制将累计 1900 万行代码修改量与旗舰项目贡献榜印在 SVG 面板上
          plugin_lines: yes
          plugin_lines_sections: base, repositories

          # 💡 彻底关闭会报Unexpected error的子插件
          plugin_activity: no
          plugin_achievements: no
          plugin_habits: no
          plugin_isocalendar: no
