name: Generate Profile Assets

on:
  schedule:
    - cron: "0 18 * * *" # 每天自动更新
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true       # 🚀 强制在 Node 24 运行，消灭 Node 20 警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 自动生成专属暗黑贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 调用 lowlighter/metrics 生成全景统计看板（增量集成了 3D 柱状图与极客游戏成就徽章）
      - name: Generate GitHub Metrics Infographics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # 💡 使用包含 repo 与 user 读取权限的 Personal Access Token
          user: MeiSiristhebest
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          output_action: none  # 💡 关键参数：禁止 Metrics 自动提交并清除图片，保留给后续步骤手动统一 commit & push
          repositories_forks: yes  # 💡 允许统计你 Fork 出来的仓库数据

          # 💡 [增量配置 1] 编程语言分析
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 0  # 💡 设为 0 代表全盘扫描统计历史所有仓库语言

          # 💡 [增量配置 2] 3D 立体等轴测 commits 柱状日历（科技感拉满）
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 💡 [增量配置 3] 游戏化极客成就徽章（解锁你获得的硬核开源成就）
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: B  # 只显示 B 级及以上的高含金量成就

      # 3. 自动将生成的贪吃蛇与全景看板一同提交回仓库
      - name: Commit and Push Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake.svg github-metrics.svg
          git commit -m "chore: update profile metrics and snake assets [skip ci]" || exit 0
          git push
