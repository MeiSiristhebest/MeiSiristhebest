name: Generate Profile Assets

on:
  schedule:
    - cron: "0 18 * * *" # 每天自动更新
  workflow_dispatch:

# 💡 全局环境变量配置
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true       # 🚀 强制让 JavaScript Actions 在 Node 24 运行，消灭 Node 20 弃用警告！
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # 备用宽松安全校验

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 💡 升级为最新的 checkout action
      - name: Checkout
        uses: actions/checkout@v4.2.2 

      # 1. 自动生成专属暗黑贪吃蛇 SVG
      - name: Generate Snake Game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MeiSiristhebest
          outputs: |
            github-contribution-grid-snake-dark.svg?palette=github-dark
            github-contribution-grid-snake.svg

      # 2. 自动提交回仓库
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake.svg
          git commit -m "chore: update snake contribution graph [skip ci]" || exit 0
          git push
